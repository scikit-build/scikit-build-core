name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - v[0123456789]*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 3

permissions: {}

jobs:
  changes:
    name: Identify source changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      pull-requests: read # Ana06/get-changed-files reads the PR's file list
    outputs:
      run-tests: ${{ steps.tests-changes.outputs.run-tests || false }}
      run-docs: ${{ steps.docs-changes.outputs.run-docs || false }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Get a list of the changed test-related files
        if: github.event_name == 'pull_request'
        id: changed-test-files
        uses: Ana06/get-changed-files@25f79e676e7ea1868813e21465014798211fad8c # v2.3.0
        with:
          filter: |
            src/**
            tests/**
            pyproject.toml
            noxfile.py
            uv.lock
            .github/workflows/ci.yml

      - name: Set a flag for running the tests
        if: >-
          github.event_name != 'pull_request' ||
          steps.changed-test-files.outputs.added_modified_renamed != ''
        id: tests-changes
        run: echo "run-tests=true" >> "${GITHUB_OUTPUT}"

      # src is included because the docs build the API reference and run the
      # documentation examples against the current source.
      - name: Get a list of the changed docs-related files
        if: github.event_name == 'pull_request'
        id: changed-docs-files
        uses: Ana06/get-changed-files@25f79e676e7ea1868813e21465014798211fad8c # v2.3.0
        with:
          filter: |
            docs/**
            src/**
            README.md
            noxfile.py
            pyproject.toml
            .github/workflows/ci.yml

      - name: Set a flag for building the docs
        if: >-
          github.event_name != 'pull_request' ||
          steps.changed-docs-files.outputs.added_modified_renamed != ''
        id: docs-changes
        run: echo "run-docs=true" >> "${GITHUB_OUTPUT}"

  lint:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Install nox
        run: uv tool install nox
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        with:
          extra_args: --all-files
      - name: Run PyLint
        run: nox -s pylint -- --output-format=github
      - name: Run nox generator
        run: |
          nox -t gen
          git diff --exit-code

  checks:
    name:
      🐍 ${{ matrix.python-version }} • CMake ${{ matrix.cmake-version }} on ${{
      matrix.runs-on }} ${{ matrix.architecture }}
    needs: changes
    if: fromJSON(needs.changes.outputs.run-tests)
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "pypy-3.11", "3.13", "3.14", "3.15"]
        runs-on: [ubuntu-latest]
        cmake-version: ["3.15.x"]

        include:
          - python-version: "pypy-3.9"
            runs-on: windows-2022
            cmake-version: "3.21.x"
          - python-version: "3.11"
            runs-on: windows-2022
            cmake-version: "3.26.x"
          - python-version: "pypy-3.9"
            runs-on: ubuntu-latest
            cmake-version: "3.15.x"
          - python-version: "3.9"
            runs-on: ubuntu-latest
            cmake-version: "3.20.x"
          - python-version: "3.14t"
            runs-on: ubuntu-latest
            cmake-version: "4.2.x"
          - python-version: "3.15t"
            runs-on: ubuntu-latest
            cmake-version: "4.2.x"
          # TODO: investigate failure with pypy-3.9/macos-latest (#1166)
          - python-version: "pypy-3.10"
            runs-on: macos-latest
            cmake-version: "4.1.x"
          - python-version: "3.14t"
            runs-on: macos-latest
            cmake-version: "4.2.x"
          - python-version: "3.15t"
            runs-on: macos-latest
            cmake-version: "4.2.x"
          - python-version: "3.9"
            runs-on: macos-latest
            cmake-version: "3.21.x"
          - python-version: "3.9"
            runs-on: macos-15-intel
            cmake-version: "3.18.x"
          - python-version: "3.12"
            runs-on: macos-15-intel
            cmake-version: "3.29.x"
          - python-version: "3.10"
            runs-on: ubuntu-latest
            cmake-version: "3.22.x"
          - python-version: "3.11"
            runs-on: ubuntu-latest
            cmake-version: "3.26.x"
          - python-version: "3.9"
            runs-on: windows-2022
            cmake-version: "3.24.x"
          # CMake < 4.2 cannot detect Visual Studio 2026, so rows testing older
          # CMake versions need the VS 2022 image: windows-latest and
          # windows-2025 are both migrating to VS 2026 by default
          # (https://github.com/actions/runner-images/issues/14017).
          - python-version: "3.12"
            runs-on: windows-2022
            cmake-version: "3.26.x"
            architecture: x86
          - python-version: "3.14"
            runs-on: windows-2022
            cmake-version: "4.0.x"
          - python-version: "3.13"
            runs-on: windows-2022
            cmake-version: "3.26.x"
          - python-version: "3.14"
            runs-on: windows-2025-vs2026
            cmake-version: "4.2.x"
          - python-version: "3.9"
            runs-on: ubuntu-22.04
            cmake-version: "3.15.x"
          - python-version: "3.13"
            runs-on: ubuntu-24.04-arm
            cmake-version: "3.31.x"
          - python-version: "3.12"
            runs-on: windows-11-arm
            cmake-version: "4.0"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
          architecture: ${{ matrix.architecture }}

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Setup CMake ${{ matrix.cmake-version }}
        uses: jwlawson/actions-setup-cmake@0d6a7d60b009d01c9e7523be22153ff8f19460d3 # v2.2.0
        with:
          cmake-version: ${{ matrix.cmake-version }}

      - name: Install package (uv)
        run:
          uv pip install -e.[wheels,wheel-free-setuptools] --group=dev --system

      - name: Test package
        if: "!contains(matrix.python_version, 'pypy')"
        run: >-
          pytest -ra --showlocals --cov --cov-report=xml --cov-report=term -n
          auto --durations=20

      - name: Test package (two attempts)
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        if: "contains(matrix.python_version, 'pypy')"
        with:
          max_attempts: 2
          retry_on: error
          timeout_seconds: 5
          command: >-
            pytest -ra --showlocals --cov --cov-report=xml --cov-report=term
            --durations=20 -n auto

      - name: Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          name:
            ${{ runner.os }}-${{ matrix.python-version }}-${{
            matrix.cmake-version }}
          verbose: true
          token: 6d9cc0e0-158a-41ee-b8f4-0318d3595ac2

  checks-32bit:
    name: 🐍 3.13 • 32-bit Linux (i686)
    needs: changes
    if: fromJSON(needs.changes.outputs.run-tests)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # actions/setup-python has no 32-bit Linux builds, and `container:` can't
      # run i386 images (the runner injects a 64-bit node), so use docker
      # directly. i386 runs natively on the amd64 host. No numpy: no i686
      # wheels; numpy-dependent tests skip. linux32 makes uname report i686.
      - name: Test package
        run: |
          docker run -i --rm --platform linux/386 -v "$PWD:/io" -w /io \
            i386/python:3.13-slim linux32 bash -euxs <<'EOF'
          apt-get update
          apt-get install -y --no-install-recommends cmake make ninja-build g++ git
          git config --global --add safe.directory /io
          pip install -U pip
          pip install -e ".[wheel-free-setuptools]" --group test-parallel \
            --group test-meta --group test-pybind11 --group test-schema
          pytest -ra --showlocals -n auto --durations=20
          EOF

  min:
    name: Min 🐍 ${{ matrix.python-version }} on ${{ matrix.runs-on }}
    needs: changes
    if: fromJSON(needs.changes.outputs.run-tests)
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]
        # TODO: investigate failure with macos-latest (#1167)
        # windows-2022: this job uses CMake 3.21, which cannot detect VS 2026;
        # windows-latest/windows-2025 are migrating to VS 2026 by default
        # (https://github.com/actions/runner-images/issues/14017).
        runs-on: [ubuntu-latest, macos-15-intel, windows-2022]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      # The min requirements are not compatible with some of the extra test
      # deps, so limit to just built-in deps.
      - name: Install extra helpers
        run: uv pip install ninja --system

      - name: Install min requirements
        run: |
          uv pip install -e. --group=test --group=test-schema --resolution=lowest-direct --system

      - name: Setup CMake 3.15
        uses: jwlawson/actions-setup-cmake@0d6a7d60b009d01c9e7523be22153ff8f19460d3 # v2.2.0
        if: runner.os != 'Windows'
        with:
          cmake-version: "3.15.x"

        # First version to support VS 17.0
      - name: Setup CMake 3.21
        uses: jwlawson/actions-setup-cmake@0d6a7d60b009d01c9e7523be22153ff8f19460d3 # v2.2.0
        if: runner.os == 'Windows'
        with:
          cmake-version: "3.21.x"

      - name: Show installed packages
        run: pip list

      - name: Test min package
        run: pytest -n auto -ra --showlocals -Wdefault

  manylinux:
    name: Manylinux on 🐍 3.14 • Free-threaded
    needs: changes
    if: fromJSON(needs.changes.outputs.run-tests)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    container: quay.io/pypa/musllinux_1_2_x86_64@sha256:64919b0fd451133856a4b266317da0363a7023948f8517156c42bc437751198e # 2026.05.31-3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare venv
        run: python3.14t -m venv /venv

      - name: Install deps
        run: /venv/bin/pip install -e . --group=test ninja

      - name: Test package
        run: /venv/bin/pytest

  cygwin:
    name: Tests on 🐍 3.9 • cygwin
    needs: changes
    if: fromJSON(needs.changes.outputs.run-tests)
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: cygwin/cygwin-install-action@3f0a3f9f988f7e96b8c18098ae05eaec175f5b52 # v6.1
        with:
          platform: x86_64
          packages:
            cmake ninja git make gcc-g++ python39 python39-devel python39-pip

      # Does not include test-numpy, since there are no wheels for this platform
      - name: Install
        run:
          python3.9 -m pip install . --group=test-core --group=test-pybind11
          --group=test-parallel --group=test-schema --group=test-meta

      - name: Test package
        run:
          python3.9 -m pytest -n auto -ra --showlocals -m "not virtualenv"
          --durations=20

  msys:
    name: Tests on 🐍 3 • msys UCRT
    needs: changes
    if: fromJSON(needs.changes.outputs.run-tests)
    runs-on: windows-latest
    timeout-minutes: 30

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2.32.0
        with:
          msystem: UCRT64
          path-type: minimal
          update: true
          install: >-
            base-devel git
          pacboy: >-
            python:p python-pip:p gcc:p cmake:p

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install
        run: python -m pip install . --group=test

      - name: Test package
        run: >-
          python -m pytest -n auto -ra --showlocals -m "not broken_on_urct"
          --durations=20

  mingw64:
    name: Tests on 🐍 3 • mingw64
    needs: changes
    if: fromJSON(needs.changes.outputs.run-tests)
    runs-on: windows-latest
    timeout-minutes: 30

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2.32.0
        with:
          msystem: mingw64
          path-type: minimal
          update: true
          install: >-
            base-devel git
          pacboy: >-
            python:p python-pip:p gcc:p cmake:p

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install
        run: python -m pip install . --group=test

      - name: Test package
        run: >-
          python -m pytest -n auto -ra --showlocals -m "not setuptools"
          --durations=20
        env:
          SETUPTOOLS_USE_DISTUTILS: "local"

  dist:
    name: Distribution build
    needs: changes
    if: fromJSON(needs.changes.outputs.run-tests)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: hynek/build-and-inspect-python-package@d44ca7d91762de7a7d5436ddae667c6da6d1c3df # v2.18.0

  docs:
    name: Docs on ${{ matrix.runs-on }}
    needs: changes
    if: fromJSON(needs.changes.outputs.run-docs)
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        runs-on: [ubuntu-latest, macos-latest] # Windows command output issue (wrong Python selected)

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - uses: wntrblm/nox@97e345e6a26bb2c5aacff9cc4327bd4ac1b00ce6 # 2026.04.10
        with:
          python-versions: "3.12"

      - name: Linkcheck
        if: runner.os == 'Linux'
        run: nox -s docs -- -b linkcheck

      - name: Manpage
        run: nox -s docs -- -b man -W

      - name: Build docs with warnings as errors
        if: runner.os == 'Linux'
        run: nox -s docs -- -W

      - name: Check examples
        run: nox -s test_doc_examples

      - name: Verify no changes required to API docs
        run: |
          nox -s build_api_docs
          git diff --exit-code

  pass:
    name: CI pass
    if: always()
    needs: [changes, lint, checks, min, cygwin, dist, docs]
    runs-on: ubuntu-slim
    timeout-minutes: 2
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          allowed-skips: >-
            ${{
              !fromJSON(needs.changes.outputs.run-tests)
              && '
              checks,
              min,
              cygwin,
              dist,
              '
              || ''
            }} ${{
              !fromJSON(needs.changes.outputs.run-docs)
              && '
              docs,
              '
              || ''
            }}
          jobs: ${{ toJSON(needs) }}
